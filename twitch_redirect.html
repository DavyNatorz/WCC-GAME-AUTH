<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Twitch Login</title>
</head>
<body>

Logging in...

<script>

const hash =
    window.location.hash.substring(1);

const params =
    new URLSearchParams(hash);

const token =
    params.get("access_token");

if(token){

    if(window.opener){

        window.opener.postMessage(
            {
                type:"TWITCH_LOGIN",
                token:token
            },
            "*"
        );
    }

    window.close();
}

</script>

</body>
</html>
