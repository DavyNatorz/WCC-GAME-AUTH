<!DOCTYPE html>
<html>
<body>

<script>

const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const token = params.get("access_token");

if (token && window.opener) {

	window.opener.postMessage(
		{
			type: "TWITCH_LOGIN",
			token: token
		},
		"*"
	);

	window.close();
}

</script>

</body>
</html>
