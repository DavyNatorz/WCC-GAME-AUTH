<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WCC 2026 — Twitch Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e10; color: #efeff1;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 24px; padding: 2rem;
    }
    h1  { font-size: 1.8rem; }
    p   { color: #adadb8; text-align: center; max-width: 420px; line-height: 1.6; }

    #login-btn {
      display: flex; align-items: center; gap: 12px;
      background: #9147ff; color: #fff; border: none;
      border-radius: 6px; padding: 14px 28px;
      font-size: 1.1rem; font-weight: 600; cursor: pointer;
    }
    #login-btn:hover { background: #772ce8; }
    #login-btn svg   { width: 24px; height: 24px; fill: white; }

    #status-box {
      display: none; flex-direction: column;
      align-items: center; gap: 16px; text-align: center;
    }
    #status-box .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid #9147ff;
    }
    #status-box h2  { font-size: 1.4rem; }
    #status-box p   { color: #adadb8; }

    .back-link {
      color: #9147ff; text-decoration: none; font-size: 0.9rem;
      margin-top: 8px; display: inline-block;
    }
    .back-link:hover { text-decoration: underline; }
    .game-link {
      display: inline-block;
      background: #1db954; color: white; border: none;
      border-radius: 6px; padding: 12px 24px;
      font-size: 1rem; font-weight: 600;
      text-decoration: none; margin-top: 8px;
    }
    .game-link:hover { background: #17a349; }
  </style>
</head>
<body>

  <!-- Step 1: Login prompt -->
  <div id="login-box">
    <h1>🍽 WCC 2026</h1>
    <p>Sign in with Twitch to save your score to the leaderboard, then head back to the game.</p>
    <button id="login-btn" type="button">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
      </svg>
      Login with Twitch
    </button>
    <a href="https://davynatorz.itch.io/wasabi-charity-cup-the-game-2026" class="back-link">← Back to game without login</a>
  </div>

  <!-- Step 2: Success state -->
  <div id="status-box">
    <img id="avatar" class="avatar" src="" alt="" />
    <h2 id="display-name"></h2>
    <p>✓ You're logged in! Your scores will be saved to the leaderboard.</p>
    <a href="https://davynatorz.itch.io/wasabi-charity-cup-the-game-2026" class="game-link">▶ Play the Game</a>
  </div>

  <script>
    var CLIENT_ID    = "o0oqihrfbbslq8k8ph7ykcw3souscg";
    var REDIRECT_URI = encodeURIComponent(window.location.href.split("#")[0].split("?")[0]);
    var STORAGE_KEY  = "wcc_twitch_user";

    // ── Check if returning from Twitch redirect ──
    var hash   = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var token  = params.get("access_token");

    if (token) {
      // Clean URL
      history.replaceState(null, "", window.location.pathname);
      // Fetch user info
      fetch("https://api.twitch.tv/helix/users", {
        headers: {
          "Authorization": "Bearer " + token,
          "Client-Id": CLIENT_ID
        }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var user = data.data[0];
        // Store in localStorage so the game iframe can read it
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          display_name      : user.display_name,
          profile_image_url : user.profile_image_url,
          id                : user.id,
          ts                : Date.now()
        }));
        showSuccess(user);
      })
      .catch(function(e) {
        console.error(e);
        document.getElementById("login-box").style.display = "flex";
      });
    } else {
      // Check if already logged in
      try {
        var stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        // Valid for 4 hours
        if (stored && (Date.now() - stored.ts) < 4 * 60 * 60 * 1000) {
          showSuccess(stored);
        }
      } catch(e) {}
    }

    function showSuccess(user) {
      document.getElementById("login-box").style.display  = "none";
      document.getElementById("status-box").style.display = "flex";
      document.getElementById("avatar").src               = user.profile_image_url;
      document.getElementById("display-name").textContent = user.display_name;
    }

    // ── Login button ──
    document.getElementById("login-btn").addEventListener("click", function() {
      var url = "https://id.twitch.tv/oauth2/authorize"
        + "?client_id=" + CLIENT_ID
        + "&redirect_uri=" + REDIRECT_URI
        + "&response_type=token";
      window.location.href = url;
    });
  </script>
</body>
</html>
