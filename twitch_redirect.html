Logging in...

<script>

const hash = window.location.hash;

const params =
    new URLSearchParams(hash.substring(1));

const token =
    params.get("access_token");

if (token) {

    window.opener.postMessage(
        {
            type: "TWITCH_LOGIN",
            token: token
        },
        "*"
    );

    window.close();
}

</script>
